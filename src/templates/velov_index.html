<!doctype html>
<html>

<head>
    <title>LITCHI VELOV</title>
    <script src=" https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js "></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"
        integrity="sha512-4F1cxYdMiAW98oomSLaygEwmCnIP38pb4Kx70yQYqRwLVCs3DbRumfBq82T08g/4LJ/smbFGFpmeFlQgoDccgg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        function refresh(params) {
            $.ajax({
                url: "/refresh/velov",
                type: "POST",
                contentType: 'application/json',
                data: JSON.stringify({
                    "pairs": eval(params.pairs).join('-')
                }),
                success: function (data) {
                    console.debug(data)
                    parentDiv = $('<div class="parent"></div>')

                    for (let pair of data) {
                        journeyIcon = "check-circle-outline.svg"
                        pairColor = "#6D9F71"
                        if (pair.journey_status == "warn") {
                            journeyIcon = "alert-outline.svg"
                            pairColor = "#f5b700"
                        }
                        if (pair.journey_status == "no") {
                            journeyIcon = "cancel.svg"
                            pairColor = "#FF6666"
                        }
                        pairDiv = $(
                            `<div class="pair" style="background-color: ${pairColor};">
                                <div class="station">
                                    ${pair.from_station_name}
                                    <div class="bikes">
                                        <span><img class="icon" src="static/styles/bicycle.svg" />${pair.from_station_mec}</span>
                                        <span><img class="icon" src="static/styles/bicycle-electric.svg" /> ${pair.from_station_elec}</span>  
                                    </div>
                                </div>
                                <div class="travel">
                                    <img class="travel-icon" src="static/styles/${journeyIcon}" />
                                </div>
                                <div class="station to">
                                    ${pair.to_station_name}
                                    <div class="bikes">
                                        <span>${pair.to_station_stands}<img class="icon" src="static/styles/parking.svg" /></span>
                                    </div>
                                </div>
                            </div>`
                        )
                        parentDiv.append(pairDiv)
                    }

                    $("#res").html(parentDiv)

                }
            })
        }

        $(document).ready(() => {
            const params = $('#params').data()

            refresh(params)
        })
    </script>
    <link rel="stylesheet" href="static/styles/index.css">

    <style>
        .parent {
            display: flex;
            align-items: center;
            width: 100%;
            flex-direction: column;
            padding: 2rem 6rem;
            gap: 1.5rem;
        }

        .pair {
            display: flex;
            width: 100%;
            max-width: 1200px;
            justify-content: space-between;
            align-items: center;
            background-color: #CDCDCD;
            padding: 1rem;
            border-radius: 5px;
            gap: 1rem;
        }

        .travel {
            text-align: center;
        }

        .station {
            flex: 1
        }

        .to {
            text-align: right;
        }

        .icon {
            height: 2ch;
            margin-right: 10px;
        }

        .travel-icon {
            height: 4rem;
        }

        .bikes {
            display: flex;
            gap: 2ch;
            margin-top: 1rem;
        }

        .bikes span {
            display: flex;
        }

        .to .bikes {
            justify-content: end;
        }

        .to .bikes .icon {
            margin-right: 0;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <main>
        <meta id="params" data-pairs="{{ pairs }}">
        <div class="gith-icon">
            <a href="https://github.com/vqlion/litchi" target="_blank"><img src="static/styles/github.svg" alt="github icon"></a>
        </div>
        <div id="res">
            <img src="static/styles/loading.svg" class="load-icon" alt="">
        </div>
    </main>
</body>

</html>
